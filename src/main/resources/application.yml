server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: springboot-demo

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/demo_db?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  # Redis 配置
  data:
    redis:
      database: 0
      timeout: 5000ms
      port: 6379
      host: localhost

# 自定义配置
app:
  name: Spring Boot Demo
  version: 1.0.0

# 日志配置
logging:
  level:
    root: INFO
    com.example: DEBUG
  file:
    name: logs/application.log